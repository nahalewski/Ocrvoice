name: Build plugin

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.CrossServerSync/Jellyfin.Plugin.CrossServerSync.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.CrossServerSync/Jellyfin.Plugin.CrossServerSync.csproj -c Release --no-restore

      - name: Publish plugin DLL
        run: dotnet publish Jellyfin.Plugin.CrossServerSync/Jellyfin.Plugin.CrossServerSync.csproj -c Release -o publish --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.CrossServerSync
          path: publish/Jellyfin.Plugin.CrossServerSync.dll
