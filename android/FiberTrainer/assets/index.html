<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>L2 Fiber Tech Trainer</title>
<style>
  :root{
    --navy:#12233b; --steel:#1f4e79; --blue:#1f6fb2; --teal:#137a7f;
    --green:#2e8b57; --amber:#e8952b; --red:#c0392b; --ink:#1a1f26;
    --grey:#5a6a7a; --line:#d7e0ea; --bg:#eef2f7; --card:#ffffff;
    --good:#e9f6ee; --bad:#fbeceb; --pick:#eaf2fa;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,Roboto,"Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:820px; margin:0 auto; padding:16px 16px 40px;}
  /* Top bar */
  .topbar{position:sticky; top:0; z-index:20; background:var(--navy); color:#fff;
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px; display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .topbar h1{font-size:17px; margin:0; font-weight:700; flex:1; line-height:1.2;}
  .backbtn{background:rgba(255,255,255,.14); border:none; color:#fff; font-size:15px;
    padding:8px 12px; border-radius:9px; font-weight:600; cursor:pointer; display:none;}
  .backbtn.show{display:inline-block;}
  .accent{height:4px; background:linear-gradient(90deg,var(--teal),var(--amber));}
  /* Cards */
  .hero{background:linear-gradient(135deg,var(--navy),var(--steel)); color:#fff;
    border-radius:16px; padding:20px; margin-bottom:16px;}
  .hero h2{margin:0 0 6px; font-size:22px;}
  .hero p{margin:0; color:#cfdcec; font-size:14px; line-height:1.5;}
  .progwrap{margin-top:14px; background:rgba(255,255,255,.18); border-radius:10px; height:12px; overflow:hidden;}
  .progbar{height:100%; width:0; background:var(--amber); transition:width .5s;}
  .progtext{margin-top:6px; font-size:12px; color:#cfdcec;}
  .grid{display:grid; grid-template-columns:1fr; gap:12px;}
  @media(min-width:620px){ .grid{grid-template-columns:1fr 1fr;} }
  .mod{background:var(--card); border-radius:14px; padding:16px; display:flex; gap:14px;
    align-items:flex-start; border:1px solid var(--line); cursor:pointer; transition:transform .08s, box-shadow .15s;}
  .mod:active{transform:scale(.99);}
  .mod .ic{font-size:30px; line-height:1; width:40px; text-align:center;}
  .mod .body{flex:1;}
  .mod h3{margin:0 0 3px; font-size:16px; color:var(--navy);}
  .mod .bl{margin:0 0 8px; font-size:13px; color:var(--grey); line-height:1.45;}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;
    background:#eef2f7; color:var(--grey);}
  .badge.done{background:var(--good); color:var(--green);}
  .badge.started{background:#fdf3e2; color:#b3730f;}
  .examcard{background:var(--card); border:2px dashed var(--amber); border-radius:14px; padding:18px; margin-top:16px; text-align:center;}
  .examcard h3{margin:0 0 4px; color:var(--navy); font-size:18px;}
  .examcard p{margin:0 0 12px; font-size:13px; color:var(--grey);}
  /* Buttons */
  .btn{display:inline-block; border:none; border-radius:11px; padding:14px 20px; font-size:16px;
    font-weight:700; cursor:pointer; width:100%; text-align:center;}
  .btn.primary{background:var(--blue); color:#fff;}
  .btn.teal{background:var(--teal); color:#fff;}
  .btn.amber{background:var(--amber); color:#3a2a06;}
  .btn.ghost{background:#fff; color:var(--steel); border:1.5px solid var(--line);}
  .btn:disabled{opacity:.5;}
  .btn.small{width:auto; padding:10px 16px; font-size:14px;}
  .row{display:flex; gap:10px; margin-top:14px;}
  /* Lessons */
  .lesson{background:var(--card); border-radius:14px; padding:16px 18px; margin-bottom:12px; border:1px solid var(--line);}
  .lesson h3{margin:0 0 6px; font-size:16px; color:var(--teal);}
  .lesson p{margin:0; font-size:15px; line-height:1.6; color:#2a3340;}
  .sectlabel{font-size:12px; letter-spacing:1.5px; font-weight:700; color:var(--amber); margin:4px 0 8px;}
  /* Quiz */
  .qcard{background:var(--card); border-radius:14px; padding:18px; border:1px solid var(--line);}
  .qnum{font-size:12px; font-weight:700; color:var(--grey); letter-spacing:1px;}
  .qtext{font-size:18px; font-weight:700; color:var(--navy); margin:6px 0 16px; line-height:1.4;}
  .opt{display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--line);
    border-radius:12px; padding:15px 16px; margin-bottom:10px; font-size:15.5px; cursor:pointer; line-height:1.4;
    transition:border-color .1s, background .1s;}
  .opt:active{background:#f3f7fb;}
  .opt.pick{border-color:var(--blue); background:var(--pick);}
  .opt.correct{border-color:var(--green); background:var(--good);}
  .opt.wrong{border-color:var(--red); background:var(--bad);}
  .opt .mk{font-weight:800; margin-left:8px; float:right;}
  .why{margin-top:6px; padding:14px 16px; border-radius:12px; font-size:14.5px; line-height:1.55; display:none;}
  .why.show{display:block;}
  .why.ok{background:var(--good); border-left:4px solid var(--green);}
  .why.no{background:var(--bad); border-left:4px solid var(--red);}
  .why b{color:var(--navy);}
  .qprog{height:8px; background:#e2e8f0; border-radius:6px; overflow:hidden; margin-bottom:14px;}
  .qprog > div{height:100%; background:var(--teal); width:0; transition:width .3s;}
  /* Results */
  .result{background:var(--card); border-radius:16px; padding:26px 20px; text-align:center; border:1px solid var(--line);}
  .ring{width:150px; height:150px; margin:6px auto 10px; position:relative;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring .pct b{font-size:36px; color:var(--navy);}
  .ring .pct span{font-size:12px; color:var(--grey);}
  .result h2{margin:6px 0 4px; font-size:24px;}
  .result h2.pass{color:var(--green);} .result h2.fail{color:var(--red);}
  .result p{color:var(--grey); font-size:14px; margin:0 0 6px;}
  .footer{text-align:center; color:var(--grey); font-size:11px; margin-top:26px; line-height:1.6;}
  .hidden{display:none !important;}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--navy);
    color:#fff; padding:12px 18px; border-radius:10px; font-size:14px; opacity:0; transition:opacity .3s; z-index:50; max-width:90%;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="topbar">
  <button class="backbtn" id="back">‹ Back</button>
  <h1 id="title">L2 Fiber Tech Trainer</h1>
</div>
<div class="accent"></div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
(function(){
  "use strict";
  var C = window.COURSE, app = document.getElementById('app');
  var titleEl = document.getElementById('title'), backEl = document.getElementById('back');
  var STORE = 'fibertrainer.v1';

  function load(){ try{ return JSON.parse(localStorage.getItem(STORE)) || {}; }catch(e){ return {}; } }
  function save(s){ try{ localStorage.setItem(STORE, JSON.stringify(s)); }catch(e){} }
  var state = load(); // { modId: {best, started}, exam:{best} }

  function toast(msg){
    var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},1900);
  }
  function esc(s){ return s; }

  // ---- navigation ----
  var stack=[];
  function go(view, arg){ stack.push({view:view,arg:arg}); render(); }
  function back(){ if(stack.length>1){ stack.pop(); render(); } }
  backEl.onclick=back;

  function render(){
    var cur=stack[stack.length-1];
    backEl.classList.toggle('show', stack.length>1);
    window.scrollTo(0,0);
    if(cur.view==='home') return home();
    if(cur.view==='module') return moduleView(cur.arg);
    if(cur.view==='quiz') return quizView(cur.arg);
  }

  // ---- home ----
  function completedCount(){
    var n=0; C.modules.forEach(function(m){ if(state[m.id]&&state[m.id].best>=Math.round(m.quiz.length*C.passMark)) n++; });
    return n;
  }
  function home(){
    titleEl.textContent = C.title;
    var total=C.modules.length, done=completedCount();
    var pct = Math.round(done/total*100);
    var h='';
    h+='<div class="hero"><h2>Welcome, technician 👋</h2>'
      +'<p>Learn the basics, then prove it. Tap a module to read a short lesson and take the quiz. Your best scores are saved on this device.</p>'
      +'<div class="progwrap"><div class="progbar" style="width:'+pct+'%"></div></div>'
      +'<div class="progtext">'+done+' of '+total+' modules passed &nbsp;•&nbsp; '+pct+'% complete</div></div>';
    h+='<div class="grid">';
    C.modules.forEach(function(m){
      var st=state[m.id]||{}, need=Math.round(m.quiz.length*C.passMark);
      var badge='<span class="badge">'+m.quiz.length+' questions</span>';
      if(st.best!=null){
        if(st.best>=need) badge='<span class="badge done">✓ Passed '+st.best+'/'+m.quiz.length+'</span>';
        else badge='<span class="badge started">Best '+st.best+'/'+m.quiz.length+'</span>';
      }
      h+='<div class="mod" data-m="'+m.id+'"><div class="ic">'+m.icon+'</div><div class="body">'
        +'<h3>'+m.title+'</h3><p class="bl">'+m.blurb+'</p>'+badge+'</div></div>';
    });
    h+='</div>';
    // final exam
    var ex=state.exam||{};
    var exb = ex.best!=null ? ('Best: '+ex.best+'%') : 'Not attempted yet';
    h+='<div class="examcard"><h3>🎓 Final Exam</h3>'
      +'<p>15 mixed questions from every module. Score '+Math.round(C.passMark*100)+'% or higher to pass. &nbsp;('+exb+')</p>'
      +'<button class="btn amber" id="startexam">Start Final Exam</button></div>';
    h+='<div class="footer">L2 Fiber Tech Trainer &nbsp;•&nbsp; offline training tool<br>'
      +'Vendor-neutral. Always follow your site’s records, safety rules, and standards.<br>'
      +'<a href="#" id="reset" style="color:var(--grey)">Reset my progress</a></div>';
    app.innerHTML=h;
    Array.prototype.forEach.call(document.querySelectorAll('.mod'), function(el){
      el.onclick=function(){ go('module', el.getAttribute('data-m')); };
    });
    document.getElementById('startexam').onclick=function(){ go('quiz', {exam:true}); };
    document.getElementById('reset').onclick=function(e){ e.preventDefault();
      if(confirm('Erase all saved scores and progress on this device?')){ state={}; save(state); toast('Progress reset'); render(); } };
  }

  // ---- module (lessons) ----
  function moduleView(id){
    var m=byId(id); titleEl.textContent=m.title;
    var h='<div class="sectlabel">LESSON</div>';
    m.lessons.forEach(function(l){
      h+='<div class="lesson"><h3>'+l.h+'</h3><p>'+l.p+'</p></div>';
    });
    h+='<div class="row"><button class="btn teal" id="toquiz">Take the '+m.quiz.length+'-question quiz →</button></div>';
    var st=state[id]||{};
    if(st.best!=null){ h+='<p class="footer">Your best score: '+st.best+'/'+m.quiz.length+'</p>'; }
    app.innerHTML=h;
    // mark started
    state[id]=state[id]||{}; if(!state[id].started){ state[id].started=true; save(state); }
    document.getElementById('toquiz').onclick=function(){ go('quiz', {mod:id}); };
  }

  // ---- quiz engine ----
  function buildExam(){
    var pool=[];
    C.modules.forEach(function(m){ m.quiz.forEach(function(q){ pool.push(q); }); });
    shuffle(pool);
    return pool.slice(0, Math.min(15,pool.length));
  }
  function quizView(arg){
    var isExam=!!arg.exam;
    var m = isExam ? null : byId(arg.mod);
    var qs = isExam ? buildExam() : m.quiz.slice();
    titleEl.textContent = isExam ? 'Final Exam' : m.title+' — Quiz';
    var i=0, correct=0, answered=false;

    function draw(){
      window.scrollTo(0,0);
      var q=qs[i];
      var h='<div class="qprog"><div style="width:'+((i)/qs.length*100)+'%"></div></div>';
      h+='<div class="qcard"><div class="qnum">QUESTION '+(i+1)+' OF '+qs.length+(isExam?'  •  FINAL EXAM':'')+'</div>';
      h+='<div class="qtext">'+q.q+'</div>';
      q.options.forEach(function(opt,idx){
        h+='<button class="opt" data-i="'+idx+'"><span>'+opt+'</span><span class="mk" data-mk="'+idx+'"></span></button>';
      });
      h+='<div class="why" id="why"></div>';
      h+='<div class="row"><button class="btn primary hidden" id="next">Next</button></div>';
      h+='</div>';
      app.innerHTML=h;
      answered=false;
      Array.prototype.forEach.call(document.querySelectorAll('.opt'), function(el){
        el.onclick=function(){ choose(parseInt(el.getAttribute('data-i'),10)); };
      });
      document.getElementById('next').onclick=nextQ;
    }
    function choose(idx){
      if(answered) return; answered=true;
      var q=qs[i], opts=document.querySelectorAll('.opt');
      var right=q.answer;
      opts[idx].classList.add('pick');
      opts[right].classList.add('correct');
      opts[right].querySelector('.mk').textContent='✓';
      if(idx!==right){ opts[idx].classList.add('wrong'); opts[idx].querySelector('.mk').textContent='✗'; }
      else { correct++; }
      Array.prototype.forEach.call(opts,function(el){ el.onclick=null; });
      var why=document.getElementById('why');
      why.className='why show '+(idx===right?'ok':'no');
      why.innerHTML='<b>'+(idx===right?'Correct.':'Not quite.')+'</b> '+q.why;
      document.getElementById('next').classList.remove('hidden');
      document.getElementById('next').textContent = (i===qs.length-1)?'See results':'Next question';
    }
    function nextQ(){ if(i<qs.length-1){ i++; draw(); } else { results(); } }

    function results(){
      window.scrollTo(0,0);
      var pctNum=Math.round(correct/qs.length*100);
      var passed = correct/qs.length >= C.passMark;
      // save
      if(isExam){
        state.exam=state.exam||{}; if(state.exam.best==null||pctNum>state.exam.best) state.exam.best=pctNum;
      } else {
        state[arg.mod]=state[arg.mod]||{};
        if(state[arg.mod].best==null||correct>state[arg.mod].best) state[arg.mod].best=correct;
      }
      save(state);
      var R=52, CIRC=2*Math.PI*R, off=CIRC*(1-correct/qs.length);
      var col = passed? 'var(--green)':'var(--amber)';
      var h='<div class="result">';
      h+='<div class="ring"><svg width="150" height="150">'
        +'<circle cx="75" cy="75" r="'+R+'" fill="none" stroke="#e2e8f0" stroke-width="12"/>'
        +'<circle cx="75" cy="75" r="'+R+'" fill="none" stroke="'+col+'" stroke-width="12" '
        +'stroke-linecap="round" stroke-dasharray="'+CIRC+'" stroke-dashoffset="'+off+'"/></svg>'
        +'<div class="pct"><b>'+pctNum+'%</b><span>'+correct+' / '+qs.length+'</span></div></div>';
      h+='<h2 class="'+(passed?'pass':'fail')+'">'+(passed?'Passed! 🎉':'Keep practicing')+'</h2>';
      h+='<p>'+(passed
              ? (isExam?'Great work — you’ve got the fundamentals down.':'You’ve got this module down.')
              : 'You need '+Math.round(C.passMark*100)+'% to pass. Review the lesson and try again — you’ll get it.')+'</p>';
      h+='<div class="row"><button class="btn ghost small" id="retry">Try again</button>'
        +'<button class="btn primary small" id="homeb">Back to modules</button></div>';
      h+='</div>';
      app.innerHTML=h;
      document.getElementById('retry').onclick=function(){ i=0; correct=0; if(isExam) qs=buildExam(); draw(); };
      document.getElementById('homeb').onclick=function(){ stack=[{view:'home'}]; render(); };
      if(passed) toast(isExam?'Final exam passed!':'Module passed!');
    }
    draw();
  }

  // ---- helpers ----
  function byId(id){ for(var i=0;i<C.modules.length;i++) if(C.modules[i].id===id) return C.modules[i]; }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

  // Android hardware back button hook (called from Java)
  window.onAndroidBack=function(){ if(stack.length>1){ back(); return true; } return false; };

  stack=[{view:'home'}]; render();
})();
</script>
</body>
</html>
