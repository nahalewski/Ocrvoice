services:
  - type: web
    name: credit-report-studio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.22.1
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
